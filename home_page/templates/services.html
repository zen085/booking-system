

{% extends 'base.html' %}

{% block content %}

<style>

.card img{
    height: 250px;
    object-fit: cover;
}

.card{
    transition: 0.3s ease;
    border-radius: 12px;
    overflow: hidden;
}

.card:hover{
    transform: translateY(-5px);
}

.book-btn {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    margin-top: 10px;
    border-radius: 6px;
}

.book-btn:hover {
    background-color: #218838;
}

</style>

<h1 class="mb-4">Our Services</h1>

<input type="hidden"
       id="service_id"
       value="{{ service_id }}">

<!-- BOOTSTRAP GRID -->
<div class="row g-4">

    {% for service in services %}

    <div class="col-lg-4 col-md-6">

        <div class="card shadow h-100">

            <img src="{{ service.image.url }}"
                 class="card-img-top"
                 alt="{{ service.name }}">

            <div class="card-body d-flex flex-column">

                <h3 class="card-title">
                    {{ service.name }}
                </h3>

                <p class="card-text">
                    {{ service.description }}
                </p>

                <a href="{% url 'bookings:booking' service.id %}" class="mt-auto">
                    <button class="book-btn w-100">
                        Book Now
                    </button>
                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
